<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SkyVayu | Admin</title>
<script src="../js/config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FAF7F2;--bg-secondary:#F0EAE0;--bg-card:#FFF8F0;--gold:#C4860A;--text:#1C1410;--text-secondary:#6B5940;--text-tertiary:#8A7560;--border:rgba(107,89,64,0.15);--border-hover:rgba(107,89,64,0.3);--green:#4A8A14;--green-faint:rgba(59,109,17,0.1);--red:#C0392B;--red-faint:rgba(192,57,43,0.08);--amber:#C4860A;--radius:8px;--radius-lg:12px;--font-display:Georgia,serif;--font:-apple-system,sans-serif;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6;}
#page-login{display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:40px 36px;width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:24px;}.login-logo .sky{font-size:9px;letter-spacing:4px;color:var(--text-tertiary);text-transform:uppercase;}.login-logo .vayu{font-family:var(--font-display);font-size:26px;color:var(--gold);display:block;}.admin-tag{font-size:11px;color:var(--text-tertiary);text-align:center;margin-bottom:24px;letter-spacing:.05em;}
.field-group{margin-bottom:16px;}.field-label{font-size:11px;font-weight:500;color:var(--text-tertiary);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:6px;}
.field-input{width:100%;height:42px;padding:0 14px;background:rgba(0,0,0,0.03);border:0.5px solid var(--border-hover);border-radius:var(--radius);color:var(--text);font-size:14px;font-family:var(--font);outline:none;}.field-input:focus{border-color:var(--gold);}
.btn-primary{width:100%;height:44px;background:var(--gold);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;margin-top:8px;}.btn-primary:hover{background:#a87208;}
.login-error{background:var(--red-faint);border:0.5px solid rgba(192,57,43,0.3);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;}.login-error.show{display:block;}
#page-dashboard{display:none;}
.top-bar{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;}
.top-logo{display:flex;align-items:center;gap:10px;}.top-logo .sky{font-size:9px;letter-spacing:4px;color:var(--text-tertiary);text-transform:uppercase;}.top-logo .vayu{font-family:var(--font-display);font-size:18px;color:var(--gold);}.top-logo .tag{font-size:10px;color:var(--text-tertiary);background:var(--bg-secondary);border:0.5px solid var(--border);padding:2px 8px;border-radius:3px;margin-left:4px;}
.top-right{display:flex;align-items:center;gap:16px;}.top-user{font-size:12px;color:var(--text-tertiary);}
.btn-logout-sm{height:30px;padding:0 14px;background:transparent;border:0.5px solid var(--border-hover);border-radius:var(--radius);color:var(--text-secondary);font-size:12px;font-family:var(--font);cursor:pointer;}.btn-logout-sm:hover{border-color:var(--red);color:var(--red);}
.tabs-bar{background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:0 32px;display:flex;gap:4px;}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text-tertiary);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:8px;}.tab:hover{color:var(--text-secondary);}.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-badge{background:rgba(196,134,10,0.15);color:var(--gold);font-size:11px;font-weight:500;padding:1px 7px;border-radius:10px;}.tab.active .tab-badge{background:var(--gold);color:#fff;}
.content{padding:28px 32px;max-width:1000px;}
.op-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px;}
.op-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.op-company{font-size:17px;font-weight:500;color:var(--text);}.op-meta{font-size:12px;color:var(--text-tertiary);margin-top:3px;}
.status-badge{font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.status-pending{background:rgba(196,134,10,0.1);color:var(--amber);border:0.5px solid rgba(196,134,10,0.3);}
.status-approved{background:var(--green-faint);color:var(--green);border:0.5px solid rgba(59,109,17,0.3);}
.status-rejected{background:var(--red-faint);color:var(--red);border:0.5px solid rgba(192,57,43,0.25);}
.op-details{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.op-detail{font-size:12px;color:var(--text-secondary);}.op-detail span{display:block;font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;font-weight:500;margin-bottom:2px;}
.doc-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg-secondary);border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:14px;}
.doc-icon{width:32px;height:32px;background:rgba(196,134,10,0.1);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.doc-name{font-size:13px;color:var(--text);font-weight:500;flex:1;}.doc-sub{font-size:11px;color:var(--text-tertiary);}
.btn-view-doc{height:30px;padding:0 14px;background:var(--gold);color:#fff;border:none;border-radius:var(--radius);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;white-space:nowrap;}.btn-view-doc:hover{background:#a87208;}
.action-row{display:flex;gap:10px;align-items:center;padding-top:14px;border-top:0.5px solid var(--border);flex-wrap:wrap;}
.btn-approve{height:36px;padding:0 20px;background:var(--green);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;}.btn-approve:hover{background:#3a7010;}
.btn-reject{height:36px;padding:0 20px;background:transparent;border:0.5px solid rgba(192,57,43,0.4);color:var(--red);border-radius:var(--radius);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;}.btn-reject:hover{background:var(--red-faint);}
.btn-undo{height:36px;padding:0 20px;background:transparent;border:0.5px solid var(--border-hover);color:var(--text-secondary);border-radius:var(--radius);font-size:13px;font-family:var(--font);cursor:pointer;margin-left:auto;}
.rejection-input{flex:1;min-width:180px;height:36px;padding:0 12px;background:rgba(0,0,0,0.03);border:0.5px solid var(--border-hover);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--font);outline:none;display:none;}.rejection-input.show{display:block;}
.btn-confirm-reject{height:36px;padding:0 16px;background:var(--red);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;display:none;white-space:nowrap;}.btn-confirm-reject.show{display:block;}
.empty-state{text-align:center;padding:60px 24px;}.empty-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:6px;}.empty-sub{font-size:13px;color:var(--text-tertiary);}
.loading{text-align:center;padding:40px;color:var(--text-tertiary);font-size:13px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-card);border:0.5px solid var(--border-hover);border-radius:var(--radius);padding:12px 18px;font-size:13px;color:var(--text);z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;}.toast.show{transform:translateY(0);opacity:1;}.toast.success{border-color:rgba(59,109,17,0.5);color:var(--green);}.toast.error{border-color:rgba(192,57,43,0.5);color:var(--red);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;}
.stat-num{font-family:var(--font-display);font-size:32px;font-weight:300;color:var(--gold);line-height:1;}
.stat-label{font-size:12px;color:var(--text-tertiary);margin-top:4px;}
</style>
</head>
<body>

<div id="page-login">
  <div class="login-box">
    <div class="login-logo"><span class="sky">Sky</span><span class="vayu">Vayu</span></div>
    <p class="admin-tag">Super Admin Panel</p>
    <div class="login-error" id="login-error">Incorrect password</div>
    <div class="field-group"><label class="field-label">Admin password</label><input type="password" class="field-input" id="admin-password" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doAdminLogin()"/></div>
    <button class="btn-primary" onclick="doAdminLogin()">Sign in</button>
  </div>
</div>

<div id="page-dashboard">
  <div class="top-bar">
    <div class="top-logo">
      <div><span class="sky">Sky</span><span class="vayu">Vayu</span></div>
      <span class="tag">Super Admin</span>
    </div>
    <div class="top-right">
      <span class="top-user">Logged in as Swati</span>
      <button class="btn-logout-sm" onclick="doAdminLogout()">Sign out</button>
    </div>
  </div>
  <div class="tabs-bar">
    <div class="tab active" id="tab-pending" onclick="showTab('pending')">Pending applications <span class="tab-badge" id="badge-pending">0</span></div>
    <div class="tab" id="tab-approved" onclick="showTab('approved')">Approved operators <span class="tab-badge" id="badge-approved">0</span></div>
    <div class="tab" id="tab-rejected" onclick="showTab('rejected')">Rejected <span class="tab-badge" id="badge-rejected">0</span></div>
  </div>
  <div class="content">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">Pending review</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-approved">0</div><div class="stat-label">Approved operators</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-rejected">0</div><div class="stat-label">Rejected</div></div>
    </div>
    <div id="tab-content-pending"><div class="loading">Loading...</div></div>
    <div id="tab-content-approved" style="display:none;"><div class="loading">Loading...</div></div>
    <div id="tab-content-rejected" style="display:none;"><div class="loading">Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL=SKYVAYU_CONFIG.supabaseUrl;
var SUPABASE_KEY=SKYVAYU_CONFIG.supabaseKey;
var ADMIN_PASSWORD='SkyVayu@Admin2026';
var allOperators=[];

function sbFetch(path,opts){
  opts=opts||{};
  var headers={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
  if(opts.prefer)headers['Prefer']=opts.prefer;
  return fetch(SUPABASE_URL+'/rest/v1/'+path,{method:opts.method||'GET',headers:headers,body:opts.body?JSON.stringify(opts.body):undefined})
    .then(function(r){if(r.status===204)return{ok:r.ok,data:[]};return r.json().then(function(d){return{ok:r.ok,status:r.status,data:d};});});
}

function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3500);}

function doAdminLogin(){
  var pw=document.getElementById('admin-password').value;
  if(pw!==ADMIN_PASSWORD){document.getElementById('login-error').classList.add('show');return;}
  document.getElementById('login-error').classList.remove('show');
  document.getElementById('page-login').style.display='none';
  document.getElementById('page-dashboard').style.display='block';
  loadOperators();
}

function doAdminLogout(){
  document.getElementById('page-dashboard').style.display='none';
  document.getElementById('page-login').style.display='flex';
  document.getElementById('admin-password').value='';
}

async function loadOperators(){
  var res=await sbFetch('operators?order=created_at.desc&select=*,operator_users(id,username,full_name,role)');
  allOperators=res.ok?res.data:[];
  updateStats();
  renderTab('pending');
  renderTab('approved');
  renderTab('rejected');
}

function updateStats(){
  var p=allOperators.filter(function(o){return o.approval_status==='pending';}).length;
  var a=allOperators.filter(function(o){return o.approval_status==='approved';}).length;
  var r=allOperators.filter(function(o){return o.approval_status==='rejected';}).length;
  document.getElementById('stat-pending').textContent=p;
  document.getElementById('stat-approved').textContent=a;
  document.getElementById('stat-rejected').textContent=r;
  document.getElementById('badge-pending').textContent=p;
  document.getElementById('badge-approved').textContent=a;
  document.getElementById('badge-rejected').textContent=r;
}

function showTab(tab){
  ['pending','approved','rejected'].forEach(function(t){
    document.getElementById('tab-'+t).classList.remove('active');
    document.getElementById('tab-content-'+t).style.display='none';
  });
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('tab-content-'+tab).style.display='block';
}

function fmtDateTime(iso){if(!iso)return'—';return new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}

async function openDocument(docUrl){
  if(!docUrl){showToast('No document uploaded','error');return;}
  var marker='/storage/v1/object/operator-documents/';
  var idx=docUrl.indexOf(marker);
  if(idx===-1){window.open(docUrl,'_blank');return;}
  var path=docUrl.substring(idx+marker.length);
  var res=await fetch(SUPABASE_URL+'/storage/v1/object/sign/operator-documents/'+path,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
    body:JSON.stringify({expiresIn:60})
  });
  if(!res.ok){showToast('Could not open document','error');return;}
  var data=await res.json();
  if(data.signedURL){window.open(SUPABASE_URL+'/storage/v1'+data.signedURL,'_blank');}
  else window.open(docUrl,'_blank');
}

function renderTab(status){
  var el=document.getElementById('tab-content-'+status);
  var ops=allOperators.filter(function(o){return o.approval_status===status;});
  if(!ops.length){
    var msgs={pending:'No pending applications',approved:'No approved operators yet',rejected:'No rejected applications'};
    var subs={pending:'New operator registrations will appear here',approved:'Approved operators can log in to the portal',rejected:'Rejected applications appear here'};
    el.innerHTML='<div class="empty-state"><div class="empty-title">'+msgs[status]+'</div><div class="empty-sub">'+subs[status]+'</div></div>';
    return;
  }
  el.innerHTML=ops.map(function(op){return renderOperatorCard(op);}).join('');
}

function renderOperatorCard(op){
  var owner=(op.operator_users||[]).find(function(u){return u.role==='owner';});
  var empCount=(op.operator_users||[]).filter(function(u){return u.role==='employee';}).length;
  var statusClass='status-'+op.approval_status;
  var statusLabel=op.approval_status==='pending'?'Pending review':op.approval_status==='approved'?'Approved':'Rejected';
  var docHtml=op.aop_document_url
    ?'<div class="doc-row"><div class="doc-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><div style="flex:1"><div class="doc-name">'+(op.aop_document_name||'Air Operator\'s Permit')+'</div><div class="doc-sub">AOP Document</div></div><button class="btn-view-doc" onclick="openDocument(\''+op.aop_document_url+'\')">View document</button></div>'
    :'<div class="doc-row" style="opacity:.5;"><div class="doc-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div><div class="doc-name" style="color:var(--text-tertiary);">No document uploaded</div></div>';
  var actionHtml='';
  if(op.approval_status==='pending'){
    actionHtml='<div class="action-row"><button class="btn-approve" onclick="approveOperator(\''+op.id+'\')">✓ Approve</button><button class="btn-reject" onclick="showRejectInput(\''+op.id+'\')">✗ Reject</button><input class="rejection-input" id="reject-reason-'+op.id+'" placeholder="Reason for rejection (optional)"><button class="btn-confirm-reject" id="confirm-reject-'+op.id+'" onclick="rejectOperator(\''+op.id+'\')">Confirm rejection</button></div>';
  } else if(op.approval_status==='approved'){
    actionHtml='<div class="action-row"><span style="font-size:12px;color:var(--green);">✓ Approved</span><button class="btn-undo" onclick="revokeOperator(\''+op.id+'\')">Revoke approval</button></div>';
  } else {
    actionHtml='<div class="action-row">'+(op.rejection_reason?'<span style="font-size:12px;color:var(--red);">Reason: '+op.rejection_reason+'</span>':'<span style="font-size:12px;color:var(--text-tertiary);">No reason given</span>')+'<button class="btn-undo" onclick="approveOperator(\''+op.id+'\')">Move to approved</button></div>';
  }
  return '<div class="op-card" id="op-card-'+op.id+'">'
    +'<div class="op-card-top"><div><div class="op-company">'+op.company_name+'</div><div class="op-meta">Applied '+fmtDateTime(op.created_at)+(empCount?' · '+empCount+' employee'+(empCount>1?'s':''):'')+'</div></div><span class="status-badge '+statusClass+'">'+statusLabel+'</span></div>'
    +'<div class="op-details"><div class="op-detail"><span>Owner / Director</span>'+(op.owner_name||'—')+'</div><div class="op-detail"><span>Phone</span>'+(op.owner_phone||'—')+'</div><div class="op-detail"><span>Email</span>'+(op.owner_email||'—')+'</div><div class="op-detail"><span>Username</span>'+(owner?'@'+owner.username:'—')+'</div></div>'
    +docHtml+actionHtml+'</div>';
}

function showRejectInput(opId){
  document.getElementById('reject-reason-'+opId).classList.add('show');
  document.getElementById('confirm-reject-'+opId).classList.add('show');
}

async function approveOperator(opId){
  var res=await sbFetch('operators?id=eq.'+opId,{method:'PATCH',body:{approval_status:'approved',rejection_reason:null}});
  if(res.ok){showToast('Operator approved ✓','success');await loadOperators();showTab('approved');}
  else showToast('Failed to approve','error');
}

async function rejectOperator(opId){
  var reason=document.getElementById('reject-reason-'+opId).value.trim();
  var res=await sbFetch('operators?id=eq.'+opId,{method:'PATCH',body:{approval_status:'rejected',rejection_reason:reason||null}});
  if(res.ok){showToast('Operator rejected','success');await loadOperators();}
  else showToast('Failed to reject','error');
}

async function revokeOperator(opId){
  if(!confirm('Revoke this operator\'s approval? They will no longer be able to log in.'))return;
  var res=await sbFetch('operators?id=eq.'+opId,{method:'PATCH',body:{approval_status:'pending'}});
  if(res.ok){showToast('Approval revoked','success');await loadOperators();}
  else showToast('Failed to revoke','error');
}

document.getElementById('page-login').style.display='flex';
</script>
</body>
</html>
